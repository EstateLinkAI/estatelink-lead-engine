root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/estatelink-api ./cmd/api"
bin = "./tmp/estatelink-api"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor", ".git"]
delay = 1000
stop_on_error = true

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"